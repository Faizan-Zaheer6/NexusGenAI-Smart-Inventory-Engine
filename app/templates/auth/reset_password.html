<!DOCTYPE html>
<html lang="en" class="dark"><head><meta charset="UTF-8"><title>Reset Password - NexusAI</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:#0b0f19;}</style></head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md glass-panel p-8 rounded-2xl" style="background:rgba(15,23,42,.45);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)">
<h1 class="text-2xl font-bold mb-4">Reset Password</h1>
{% if error %}<p class="text-rose-400 text-sm mb-4">{{ error }}</p>{% endif %}
<form method="POST" class="space-y-4"><input type="hidden" name="token" value="{{ token }}"><input type="password" name="new_password" required minlength="6" placeholder="New password" class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl p-3 text-sm"><button class="w-full bg-indigo-500 text-white rounded-xl py-3 text-sm font-semibold">Update Password</button></form>
</div></body></html>
