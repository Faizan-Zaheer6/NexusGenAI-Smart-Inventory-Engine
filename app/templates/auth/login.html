<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Premium Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style>
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        body { background-color: #0b0f19; background-image: radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.6) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.9) 0, transparent 50%); }
    </style>
</head>
<body class="font-sans text-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md space-y-8 z-10">
        <div class="text-center space-y-2">
            <div class="inline-flex bg-gradient-to-tr from-indigo-500 to-purple-600 p-3 rounded-2xl shadow-xl shadow-indigo-500/20 mb-2">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <h2 class="font-outfit font-extrabold text-3xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent">Nexus<span class="text-indigo-500">AI</span> Auth</h2>
            <p class="text-sm text-slate-400">Secure entry to Smart Inventory Engine</p>
        </div>

        <div class="glass-panel p-8 rounded-3xl shadow-2xl">
            {% if error %}
            <div class="mb-5 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm font-medium">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-5">
                <div class="space-y-1.5">
                    <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" name="email" id="email" value="guest@nexusai.com" required class="bg-slate-900/60 border border-slate-700/50 text-slate-100 text-sm rounded-xl block w-full p-3.5 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none">
                    <p class="text-[10px] text-slate-500">Demo: guest@nexusai.com / guestpassword</p>
                </div>
                <div class="space-y-1.5">
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" id="password" value="guestpassword" required class="bg-slate-900/60 border border-slate-700/50 text-slate-100 text-sm rounded-xl block w-full p-3.5 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full text-white bg-indigo-500 hover:bg-indigo-600 font-semibold rounded-xl text-sm px-5 py-4 transition-all shadow-lg shadow-indigo-500/10">Sign In to Storefront</button>
            </form>

            <p class="text-center text-xs text-slate-500 mt-6">New here? <a href="/signup" class="text-indigo-400 hover:text-indigo-300">Create an account</a></p>
            <p class="text-center text-xs text-slate-500 mt-2"><a href="/forgot-password" class="text-indigo-400">Forgot password?</a> · <a href="/admin/login" class="text-purple-400">Admin Portal</a></p>
        </div>
        <div class="text-center"><a href="/" class="text-xs text-indigo-400 hover:text-indigo-300">← Back to Storefront</a></div>
    </div>
</body>
</html>
