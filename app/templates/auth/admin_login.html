<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Administrator Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style>
        .glass-panel { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(24px); border: 1px solid rgba(99, 102, 241, 0.2); }
        body { background-color: #0b0f19; background-image: radial-gradient(at 20% 20%, rgba(99, 102, 241, 0.12) 0, transparent 50%), radial-gradient(at 80% 80%, rgba(168, 85, 247, 0.08) 0, transparent 50%); }
    </style>
</head>
<body class="font-sans text-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center space-y-2">
            <div class="inline-flex bg-gradient-to-tr from-indigo-500 to-purple-600 p-3 rounded-2xl shadow-xl shadow-indigo-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="font-outfit font-extrabold text-3xl tracking-tight bg-gradient-to-r from-white to-indigo-300 bg-clip-text text-transparent">Admin Control Panel</h2>
            <p class="text-sm text-slate-400">Restricted access — authorized personnel only</p>
        </div>

        <div class="glass-panel p-8 rounded-3xl shadow-2xl">
            <div id="error-message" class="{% if not error %}hidden{% endif %} mb-5 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm font-medium flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span id="error-text">{{ error if error else '' }}</span>
            </div>

            <form id="admin-login-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Administrator Username / Email</label>
                    <input type="text" name="email" id="email" value="admin@nexusai.com" required class="bg-slate-900/60 border border-slate-700/50 text-slate-100 text-sm rounded-xl block w-full p-3.5 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none">
                </div>
                <div class="space-y-1.5">
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Secure Password</label>
                    <input type="password" name="password" id="password" required class="bg-slate-900/60 border border-slate-700/50 text-slate-100 text-sm rounded-xl block w-full p-3.5 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 font-semibold rounded-xl text-sm px-5 py-4 transition-all shadow-lg shadow-indigo-500/20">Authenticate & Enter Dashboard</button>
            </form>

            <script>
                document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    const errorDiv = document.getElementById('error-message');
                    const errorText = document.getElementById('error-text');
                    
                    if (errorDiv) {
                        errorDiv.classList.add('hidden');
                    }

                    try {
                        const response = await fetch('/auth/admin/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify({ email, password })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            // Store the access token and refresh token in cookies
                            document.cookie = `access_token=${data.access_token}; path=/; max-age=3600; samesite=lax`;
                            if (data.refresh_token) {
                                document.cookie = `refresh_token=${data.refresh_token}; path=/; max-age=604800; samesite=lax`;
                            }
                            // Store in sessionStorage / localStorage for state tracking
                            sessionStorage.setItem('access_token', data.access_token);
                            
                            // Redirect to admin panel
                            window.location.href = '/admin';
                        } else {
                            const errorMsg = data.detail || 'Authentication failed. Please verify credentials.';
                            if (errorDiv && errorText) {
                                errorText.textContent = errorMsg;
                                errorDiv.classList.remove('hidden');
                            }
                        }
                    } catch (err) {
                        if (errorDiv && errorText) {
                            errorText.textContent = 'Network error occurred. Please try again.';
                            errorDiv.classList.remove('hidden');
                        }
                    }
                });
            </script>

            <div class="mt-6 p-4 rounded-xl bg-amber-500/5 border border-amber-500/20">
                <p class="text-xs text-amber-400/90">Customer accounts cannot access this portal. Use the <a href="/login" class="underline hover:text-amber-300">customer login</a> for storefront access.</p>
            </div>
        </div>
        <div class="text-center"><a href="/" class="text-xs text-indigo-400 hover:text-indigo-300">← Back to Storefront</a></div>
    </div>
</body>
</html>
